name: Build and Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            name: Linux
            artifact_name: linux
            bundles: deb
            paths: |
              src-tauri/target/release/bundle/deb/*.deb
          - os: windows-latest
            platform: windows
            name: Windows
            artifact_name: windows
            bundles: nsis
            paths: |
              src-tauri/target/release/bundle/nsis/*.exe
          - os: macos-14
            platform: macos
            name: Mac OS X (arm64)
            artifact_name: macos-arm64
            bundles: dmg
            target: aarch64-apple-darwin
            paths: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - os: macos-14
            platform: macos
            name: Mac OS X (x86_64)
            artifact_name: macos-x64
            bundles: dmg
            target: x86_64-apple-darwin
            paths: |
              src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS Rust target
        if: matrix.platform == 'macos'
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update && sudo apt-get upgrade -y
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        shell: bash
        run: |
          ARGS="--bundles ${{ matrix.bundles }}"
          if [ -n "${{ matrix.target }}" ]; then
            ARGS="$ARGS --target ${{ matrix.target }}"
          fi
          npm run tauri build -- $ARGS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rigtree-fetch-${{ matrix.artifact_name }}
          path: ${{ matrix.paths }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Rename artifacts to RigTree-Fetch_$VERSION
        run: |
          VERSION="${{ github.event.inputs.version }}"
          mkdir -p release
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            for f in "$dir"*; do
              [ -f "$f" ] || continue
              base=$(basename "$f")
              ext="${base##*.}"
              case "$name" in
                rigtree-fetch-linux)   suffix="_amd64.$ext" ;;
                rigtree-fetch-windows) suffix=".$ext" ;;
                rigtree-fetch-macos-arm64) suffix="_arm64.$ext" ;;
                rigtree-fetch-macos-x64)  suffix="_x64.$ext" ;;
                *) suffix=".$ext" ;;
              esac
              cp "$f" "release/RigTree-Fetch_${VERSION}${suffix}"
            done
          done
          find release -type f

      - name: Generate release body from commits
        id: changelog
        run: |
          PREV=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV" ]; then
            BODY=$(git log --pretty=format:"- %s")
          else
            BODY=$(git log "$PREV"..HEAD --pretty=format:"- %s")
          fi
          echo "$BODY" > release-body.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          body_path: release-body.md
          files: release/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}